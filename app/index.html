<!doctype html>
<!--
  PRE-FLIGHT — stupid-simple pre-training GO/NO-GO checklist
  One screen. Pick session + duration → list adapts → tap to tick → GO.
  Persists across sessions. Part of the FUEL BLOCK family.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pre-Flight</title>
<meta name="theme-color" content="#05080B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pre-Flight">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --panel:#0E1319; --raised:#161E28; --raised2:#1D2733; --line:#26303D;
    --ink:#EAF1F8; --dim:#8093A6; --dimmer:#556477;
    --amber:#FFB020; --amber-bg:#3A2A0C; --amber-line:#5A410E;
    --cyan:#38C6E2;
    --go:#3BD57F; --go-bg:#0E3322;
    --nogo:#FF6B4A; --nogo-bg:#2A100B;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:#05080B;color:var(--ink);font-family:var(--sans)}
  body{display:flex;justify-content:center}
  #app{width:100%;max-width:468px;min-height:100vh;background:var(--panel);
    display:flex;flex-direction:column;position:relative;
    box-shadow:0 0 0 1px var(--line),0 30px 90px rgba(0,0,0,.6)}

  header{padding:16px 18px 14px;border-bottom:1px solid var(--line)}
  .htop{display:flex;align-items:center;justify-content:space-between}
  .htop h1{margin:0;font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:2.5px}
  .htop .fam{font-family:var(--mono);font-size:9.5px;color:var(--dimmer);letter-spacing:2px;margin-top:2px}
  /* GO / NO-GO lamp */
  .status{display:flex;align-items:center;gap:9px;padding:7px 13px 7px 10px;border-radius:24px;
    border:1px solid var(--nogo-bg);background:var(--nogo-bg);transition:.25s}
  .status .dot{width:11px;height:11px;border-radius:50%;background:var(--nogo);
    box-shadow:0 0 10px var(--nogo);transition:.25s}
  .status .lab{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--nogo);transition:.25s}
  .status .ct{font-family:var(--mono);font-size:11px;color:var(--dimmer);margin-left:2px}
  #app.go .status{border-color:var(--go-bg);background:var(--go-bg)}
  #app.go .status .dot{background:var(--go);box-shadow:0 0 12px var(--go)}
  #app.go .status .lab{color:var(--go)}

  main{flex:1;overflow-y:auto;padding:16px 16px 120px}

  /* session picker */
  .picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .seg{padding:13px 4px;border-radius:12px;border:1px solid var(--line);background:var(--raised);
    color:var(--dim);font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1px;
    cursor:pointer;transition:.12s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
  .seg .ic{font-size:17px;line-height:1}
  .seg:active{transform:scale(.96)}
  .seg.on{background:linear-gradient(160deg,#7a5410,var(--amber));border-color:var(--amber);color:#100B02;
    box-shadow:0 0 0 1px var(--amber),0 4px 14px rgba(255,176,32,.22)}

  /* duration stepper */
  .dur{display:flex;align-items:center;justify-content:space-between;background:var(--raised);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px 10px 16px;margin-bottom:16px}
  .dur.hide{display:none}
  .dur .lbl{font-size:12px;color:var(--dim)}
  .dur .lbl small{display:block;font-family:var(--mono);font-size:10.5px;color:var(--amber);margin-top:2px}
  .dur .ctrl{display:flex;align-items:center;gap:12px}
  .dur .val{font-family:var(--mono);font-size:22px;font-weight:700;min-width:54px;text-align:center}
  .rnd{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--raised2);
    color:var(--ink);font-size:22px;font-family:var(--mono);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .rnd:active{background:var(--amber);color:#000;border-color:var(--amber)}

  /* group label */
  .grp{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;color:var(--dimmer);
    text-transform:uppercase;margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
  .grp:first-child{margin-top:2px}
  .grp::after{content:"";flex:1;height:1px;background:var(--line)}

  /* check row */
  .check{display:flex;align-items:center;gap:14px;background:var(--raised);border:1px solid var(--line);
    border-radius:12px;padding:15px 16px;margin-bottom:9px;cursor:pointer;transition:.12s;user-select:none}
  .check:active{transform:scale(.99)}
  .check .box{width:28px;height:28px;border-radius:8px;border:2px solid var(--dimmer);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:.12s}
  .check .box svg{width:16px;height:16px;opacity:0;transform:scale(.5);transition:.15s;stroke:#04140B}
  .check .txt{font-size:15px;line-height:1.3}
  .check .txt .hint{font-family:var(--mono);font-size:11px;color:var(--dimmer)}
  .check.done{border-color:var(--go-bg);background:linear-gradient(0deg,var(--go-bg),var(--raised))}
  .check.done .box{background:var(--go);border-color:var(--go)}
  .check.done .box svg{opacity:1;transform:scale(1)}
  .check.done .txt{color:var(--dim)}
  .check.done .txt .hint{color:var(--dimmer)}

  /* bottom bar */
  .foot{position:fixed;bottom:0;left:0;right:0;max-width:468px;margin:0 auto;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--panel) 70%,transparent);
    display:flex;gap:10px}
  .cleared{flex:1;border-radius:14px;border:1px solid var(--go);background:var(--go-bg);color:var(--go);
    font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:2px;text-align:center;
    padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;opacity:.4;transition:.25s}
  #app.go .cleared{opacity:1;background:linear-gradient(160deg,#12492e,var(--go-bg));box-shadow:0 0 24px rgba(59,213,127,.25)}
  .cleared .big{font-size:16px}
  .reset{flex:0 0 auto;width:56px;border-radius:14px;border:1px solid var(--line);background:var(--raised);
    color:var(--nogo);font-family:var(--mono);font-size:18px;cursor:pointer}
  .reset:active{background:var(--nogo-bg)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div id="app">
  <header>
    <div class="htop">
      <div><h1>PRE-FLIGHT</h1><div class="fam">FUEL BLOCK · READINESS CHECK</div></div>
      <div class="status" id="status"><span class="dot"></span><span class="lab" id="statLab">NO-GO</span><span class="ct" id="statCt">0/0</span></div>
    </div>
  </header>

  <main>
    <div class="picker" id="picker">
      <div class="seg" data-sess="swim"><span class="ic">🏊</span>SWIM</div>
      <div class="seg" data-sess="bike"><span class="ic">🚴</span>BIKE</div>
      <div class="seg" data-sess="run"><span class="ic">🏃</span>RUN</div>
      <div class="seg" data-sess="brick"><span class="ic">⚡</span>BRICK</div>
    </div>

    <div class="dur" id="dur">
      <div class="lbl">Session length<small id="fuelHint">—</small></div>
      <div class="ctrl">
        <button class="rnd" data-dstep="-0.5">−</button>
        <div class="val"><span id="durVal">2</span><span style="font-size:13px;color:var(--dim)">h</span></div>
        <button class="rnd" data-dstep="0.5">+</button>
      </div>
    </div>

    <div id="list"></div>
  </main>

  <div class="foot">
    <div class="cleared" id="cleared"><span id="clearedTxt">COMPLETE THE CHECKS</span></div>
    <button class="reset" id="reset" title="Reset for next session">↺</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  const CARB_HR=75, GEL_G=25;            // his numbers
  const gels=h=>Math.max(1,Math.ceil((CARB_HR*h)/GEL_G));

  // ── per-session checklists ──  {id,label,hint}  hint may be a fn(dur)
  const gelLine=()=>({id:"gels",label:"Gels packed",grp:"fuel",hint:d=>gels(d)+" gel"+(gels(d)>1?"s":"")+" for the session"});
  const TPL={
    swim:{fuel:[
        {id:"ate",label:"Ate ~1 hr before",hint:"bank it — no fuel mid-swim"},
      ],gear:[
        {id:"goggles",label:"Goggles + cap"},
        {id:"suit",label:"Suit / wetsuit"},
        {id:"chafe",label:"Anti-chafe + towel"},
      ],tech:[
        {id:"watch",label:"Watch charged"},
        {id:"plan",label:"Where + how long known"},
      ]},
    bike:{fuel:[
        {id:"bottles",label:"Bottles filled",hint:"fluid + salt"},
        gelLine(),
        {id:"pre",label:"Pre-ride gel eaten",hint:"T-15 min"},
      ],gear:[
        {id:"fix",label:"Tube ×2 + inflation + multitool"},
        {id:"helmet",label:"Helmet · shoes · glasses"},
      ],tech:[
        {id:"headunit",label:"Head unit charged"},
        {id:"beep",label:"15-min fuel alarm set"},
        {id:"route",label:"Route + refill stops"},
      ]},
    run:{fuel:[
        gelLine(),
        {id:"bottle",label:"Handheld / bottle",hint:"if > 75 min"},
        {id:"pre",label:"Ate before"},
      ],gear:[
        {id:"shoes",label:"Shoes + socks"},
        {id:"chafe",label:"Hat + anti-chafe"},
      ],tech:[
        {id:"watch",label:"Watch charged"},
        {id:"beep",label:"Fuel alarm set",hint:"if long"},
        {id:"route",label:"Route + water known"},
      ]},
    brick:{fuel:[
        {id:"bottles",label:"Bottles filled",hint:"fluid + salt"},
        gelLine(),
        {id:"pre",label:"Pre-ride gel eaten"},
      ],gear:[
        {id:"fix",label:"Tube + inflation + multitool"},
        {id:"helmet",label:"Helmet · bike shoes · glasses"},
        {id:"t2shoes",label:"Run shoes laid out for T2"},
        {id:"laces",label:"Elastic laces / ready to run"},
      ],tech:[
        {id:"headunit",label:"Head unit charged"},
        {id:"beep",label:"15-min fuel alarm set"},
        {id:"route",label:"Route + refill stops"},
      ]},
  };
  const GRP_LABEL={fuel:"Fuel",gear:"Gear",tech:"Tech · route"};
  const NEEDS_DUR=s=>s!=="swim";

  // ── state ──
  let S={sess:"bike",dur:2,checks:{}};   // checks: {sess:{id:true}}
  const store={
    async get(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}},
    async set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  };
  let t;const save=()=>{clearTimeout(t);t=setTimeout(()=>store.set("preflight",S),200);};

  function items(){ // flat list of {id,label,grp,hint} for current session
    const tpl=TPL[S.sess],out=[];
    ["fuel","gear","tech"].forEach(g=>(tpl[g]||[]).forEach(it=>{
      out.push({...it,grp:g,hint:typeof it.hint==="function"?it.hint(S.dur):it.hint});
    }));
    return out;
  }

  function render(){
    // picker
    document.querySelectorAll(".seg").forEach(b=>b.classList.toggle("on",b.dataset.sess===S.sess));
    // duration
    $("#dur").classList.toggle("hide",!NEEDS_DUR(S.sess));
    $("#durVal").textContent=S.dur;
    $("#fuelHint").textContent=NEEDS_DUR(S.sess)?("carry "+gels(S.dur)+" gels · "+(CARB_HR*S.dur)+"g carbs"):"—";
    // list
    const its=items(),c=S.checks[S.sess]||{};
    let html="",lastG=null;
    its.forEach(it=>{
      if(it.grp!==lastG){html+=`<div class="grp">${GRP_LABEL[it.grp]}</div>`;lastG=it.grp;}
      const done=!!c[it.id];
      html+=`<div class="check ${done?"done":""}" data-id="${it.id}">
        <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>
        <div class="txt">${it.label}${it.hint?` <span class="hint">· ${it.hint}</span>`:""}</div></div>`;
    });
    $("#list").innerHTML=html;
    // status
    const total=its.length, hit=its.filter(it=>c[it.id]).length, go=hit===total&&total>0;
    $("#statCt").textContent=hit+"/"+total;
    $("#statLab").textContent=go?"GO":"NO-GO";
    $("#app").classList.toggle("go",go);
    $("#clearedTxt").innerHTML=go?`<span class="big">✈ CLEARED — SEND IT</span>`:`${total-hit} left before GO`;
  }

  document.body.addEventListener("click",e=>{
    const seg=e.target.closest("[data-sess]");
    if(seg){S.sess=seg.dataset.sess;render();save();return;}
    const step=e.target.closest("[data-dstep]");
    if(step){S.dur=Math.min(8,Math.max(0.5,+(S.dur+ +step.dataset.dstep).toFixed(1)));render();save();return;}
    const row=e.target.closest("[data-id]");
    if(row){const c=S.checks[S.sess]||(S.checks[S.sess]={});c[row.dataset.id]=!c[row.dataset.id];render();save();return;}
    if(e.target.closest("#reset")){S.checks[S.sess]={};render();save();return;}
  });

  (async()=>{
    const saved=await store.get("preflight");
    if(saved) S={...S,...saved,checks:saved.checks||{}};
    render();
  })();

  if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
})();
</script>
